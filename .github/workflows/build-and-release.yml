name: Build and Release

on:
  push:
    branches:
      - "release/**"
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-test:
    uses: ./.github/workflows/build-test.yml
    with:
      draft-check: false

  release:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: GitVersion - Setup
        uses: gittools/actions/gitversion/setup@v4.5.0
        with:
          versionSpec: "6.3.x"

      - name: GitVersion - Determine
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4.5.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'

      - name: Install dependencies
        run: npm ci

      - name: Update version in package.json
        run: |
          npm version ${{ steps.gitversion.outputs.semVer }} --no-git-tag-version

      - name: Package extension
        run: |
          npx vsce package --no-git-tag-version -o alcops-${{ steps.gitversion.outputs.semVer }}.vsix

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          tag_name: v${{ steps.gitversion.outputs.SemVer }}
          name: v${{ steps.gitversion.outputs.SemVer }}
          generate_release_notes: true
          prerelease: ${{ contains(steps.gitversion.outputs.SemVer, '-') }}
          files: |
            ./*.vsix

      - name: Publish to VS Code Marketplace
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          npx vsce publish -p ${{ secrets.VISUAL_STUDIO_MARKETPLACE_PAT }} --packagePath ./alcops-${{ steps.gitversion.outputs.semVer }}.vsix